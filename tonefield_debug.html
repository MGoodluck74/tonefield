<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToneField Audio Debug</title>
<style>
  body{background:#111;color:#eee;font-family:monospace;padding:20px;font-size:14px}
  button{display:block;width:100%;padding:18px;margin:8px 0;font-size:16px;
         background:#d4a84b;color:#000;border:none;border-radius:8px;font-weight:bold}
  button.grey{background:#333;color:#aaa}
  #log{background:#000;padding:12px;margin-top:16px;border-radius:6px;
       min-height:300px;white-space:pre-wrap;font-size:12px;line-height:1.6}
  .ok{color:#4f4}
  .err{color:#f44}
  .info{color:#4af}
</style>
</head>
<body>
<h2 style="color:#d4a84b;margin-bottom:4px">ToneField Audio Debug</h2>
<p style="color:#888;margin-bottom:16px;font-size:12px">Run these tests IN ORDER. Copy the log and send it.</p>

<button onclick="test1()">1. Check AudioContext Support</button>
<button onclick="test2()">2. Create AudioContext (inside this tap)</button>
<button onclick="test3()">3. Play 440Hz tone NOW</button>
<button onclick="test4()">4. Check context state</button>
<button onclick="test5()">5. Play silent buffer (iOS unlock trick)</button>
<button onclick="test6()">6. Play 440Hz tone AGAIN</button>
<button onclick="copyLog()" class="grey">Copy Log to Clipboard</button>

<div id="log">Waiting for tests...\n</div>

<script>
var ctx = null;
var log = document.getElementById('log');

function L(msg, cls) {
  var t = new Date().toLocaleTimeString('en-AU', {hour12:false});
  var span = document.createElement('span');
  span.className = cls || '';
  span.textContent = '[' + t + '] ' + msg + '\n';
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}

function test1() {
  L('--- TEST 1: AudioContext support ---', 'info');
  L('window.AudioContext: ' + typeof window.AudioContext);
  L('window.webkitAudioContext: ' + typeof window.webkitAudioContext);
  L('navigator.userAgent: ' + navigator.userAgent);
  L('window.innerWidth: ' + window.innerWidth + 'px');
  L('window.innerHeight: ' + window.innerHeight + 'px');
  L('maxTouchPoints: ' + navigator.maxTouchPoints);
  if (window.AudioContext || window.webkitAudioContext) {
    L('✓ AudioContext IS available', 'ok');
  } else {
    L('✗ NO AudioContext — this browser cannot do Web Audio!', 'err');
  }
}

function test2() {
  L('--- TEST 2: Create AudioContext ---', 'info');
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    ctx = new AC();
    L('✓ Created. State: ' + ctx.state, ctx.state === 'running' ? 'ok' : 'err');
    L('  SampleRate: ' + ctx.sampleRate);
    if (ctx.state === 'suspended') {
      L('  Context is SUSPENDED — trying resume()...', 'info');
      ctx.resume().then(function() {
        L('  After resume(), state: ' + ctx.state, ctx.state === 'running' ? 'ok' : 'err');
      }).catch(function(e) {
        L('  resume() FAILED: ' + e.message, 'err');
      });
    }
  } catch(e) {
    L('✗ FAILED to create: ' + e.message, 'err');
  }
}

function test3() {
  L('--- TEST 3: Play 440Hz tone ---', 'info');
  if (!ctx) { L('✗ No context — run test 2 first', 'err'); return; }
  L('  Context state before play: ' + ctx.state, ctx.state === 'running' ? 'ok' : 'err');
  try {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.frequency.value = 440;
    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.9);
    L('✓ Tone scheduled. Did you hear it? (Context: ' + ctx.state + ')', 'ok');
  } catch(e) {
    L('✗ FAILED: ' + e.message, 'err');
  }
}

function test4() {
  L('--- TEST 4: Context state check ---', 'info');
  if (!ctx) { L('✗ No context', 'err'); return; }
  L('  state: ' + ctx.state, ctx.state === 'running' ? 'ok' : 'err');
  L('  currentTime: ' + ctx.currentTime.toFixed(4));
  L('  sampleRate: ' + ctx.sampleRate);
  if (ctx.currentTime === 0) {
    L('  ⚠ currentTime is 0 — context may not be truly running!', 'err');
  }
}

function test5() {
  L('--- TEST 5: Silent buffer unlock ---', 'info');
  if (!ctx) { L('✗ No context', 'err'); return; }
  try {
    var buf = ctx.createBuffer(1, 1, 22050);
    var src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    L('✓ Silent buffer played. State: ' + ctx.state, ctx.state === 'running' ? 'ok' : 'err');
  } catch(e) {
    L('✗ FAILED: ' + e.message, 'err');
  }
}

function test6() {
  L('--- TEST 6: Play tone after unlock ---', 'info');
  if (!ctx) { L('✗ No context', 'err'); return; }
  L('  Context state: ' + ctx.state, ctx.state === 'running' ? 'ok' : 'err');
  try {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 1.1);
    L('✓ Tone at 660Hz scheduled. Hear it? (currentTime=' + ctx.currentTime.toFixed(3) + ')', 'ok');
  } catch(e) {
    L('✗ FAILED: ' + e.message, 'err');
  }
}

function copyLog() {
  var text = log.innerText;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      alert('Log copied to clipboard!');
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Log copied!');
  }
}
</script>
</body>
</html>
